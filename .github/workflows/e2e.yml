name: e2e

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    tags:
      - 'v*'
  pull_request:

env:
  BUILDX_VERSION: latest
  BUILDKIT_IMAGE: moby/buildkit:latest
  IMAGE_LOCAL: localhost:5000/buildkit-syft-scanner:latest

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.examples.outputs.matrix }}
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Create matrix
        id: examples
        run: |
          examples=$(jq -ncR '[inputs]' <<< "$(ls -A ./examples/)")
          echo "matrix=$examples" >> $GITHUB_OUTPUT
      -
        name: Show matrix
        run: |
          echo ${{ steps.examples.outputs.matrix }}

  test:
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      fail-fast: false
      matrix:
        example: ${{ fromJson(needs.prepare.outputs.matrix) }}
    services:
      registry:
        image: registry:2.8.3@sha256:a3d8aaa63ed8681a604f1dea0aa03f100d5895b6a58ace528858a7b332415373
        ports:
          - 5000:5000
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      -
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: |
            network=host
            image=${{ env.BUILDKIT_IMAGE }}
      -
        name: Build and push Syft Scanner image
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          source: .
          targets: image-local
          push: true
      -
        name: Test
        env:
          EXAMPLE: ${{ matrix.example }}
        run: |
          ./hack/check-example.sh ${{ env.IMAGE_LOCAL }} ${EXAMPLE}
      -
        name: Check output folder
        env:
          EXAMPLE: ${{ matrix.example }}
        run: |
          tree ./examples/${EXAMPLE}/build
      -
        name: Print SBOM
        if: matrix.example != 'scratch'
        env:
          EXAMPLE: ${{ matrix.example }}
        run: |
          jq . ./examples/${EXAMPLE}/build/sbom-base.spdx.json
      -
        name: Upload output folder
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-${{ matrix.example }}
          path: ./examples/${{ matrix.example }}/build/*
          if-no-files-found: error
